<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="grad-mc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="40%" style="stop-color:#EC4899"/>
      <stop offset="80%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Open book shape centered -->
  <g transform="translate(600, 340)">
    <!-- Left page -->
    <path d="M-180,-120 C-180,-130 -170,-140 -160,-140 L-10,-140 L-10,140 L-160,140 C-170,140 -180,130 -180,120 Z"
      fill="none" stroke="url(#grad-mc)" stroke-width="6" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M180,-120 C180,-130 170,-140 160,-140 L10,-140 L10,140 L160,140 C170,140 180,130 180,120 Z"
      fill="none" stroke="url(#grad-mc)" stroke-width="6" stroke-linejoin="round"/>
    <!-- Spine -->
    <line x1="-10" y1="-140" x2="-10" y2="140" stroke="url(#grad-mc)" stroke-width="5"/>
    <line x1="10" y1="-140" x2="10" y2="140" stroke="url(#grad-mc)" stroke-width="5"/>

    <!-- Compass needle on right page -->
    <circle cx="95" cy="0" r="60" fill="none" stroke="url(#grad-mc)" stroke-width="4"/>
    <!-- Needle pointing up (North) -->
    <polygon points="95,-50 89,-5 95,5 101,-5" fill="url(#grad-mc)"/>
    <!-- Needle pointing down (South) -->
    <polygon points="95,50 89,5 95,-5 101,5" fill="none" stroke="url(#grad-mc)" stroke-width="3"/>
    <!-- Center dot -->
    <circle cx="95" cy="0" r="6" fill="url(#grad-mc)"/>
    <!-- Cardinal marks -->
    <text x="95" y="-65" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="url(#grad-mc)">N</text>

    <!-- Lines of text on left page -->
    <line x1="-155" y1="-70" x2="-25" y2="-70" stroke="url(#grad-mc)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="-155" y1="-45" x2="-25" y2="-45" stroke="url(#grad-mc)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="-155" y1="-20" x2="-25" y2="-20" stroke="url(#grad-mc)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="-155" y1="5" x2="-80" y2="5" stroke="url(#grad-mc)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="-155" y1="40" x2="-25" y2="40" stroke="url(#grad-mc)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="-155" y1="65" x2="-25" y2="65" stroke="url(#grad-mc)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="-155" y1="90" x2="-100" y2="90" stroke="url(#grad-mc)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
