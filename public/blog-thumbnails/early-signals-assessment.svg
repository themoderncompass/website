<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Muted teal/slate background -->
  <rect width="1200" height="630" fill="#1E3A4A"/>

  <defs>
    <linearGradient id="grad-es" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Radar chart (4 axes for Self, Trust, Character, Relationships) -->
  <g transform="translate(600, 315)">
    <!-- Background grid rings -->
    <polygon points="0,-180 180,0 0,180 -180,0"
      fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <polygon points="0,-130 130,0 0,130 -130,0"
      fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <polygon points="0,-80 80,0 0,80 -80,0"
      fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <polygon points="0,-30 30,0 0,30 -30,0"
      fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

    <!-- Axes -->
    <line x1="0" y1="-180" x2="0" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="-180" y1="0" x2="180" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

    <!-- Data polygon (assessment results - showing varied scores) -->
    <polygon points="0,-155 120,0 0,100 -140,0"
      fill="url(#grad-es)" fill-opacity="0.25" stroke="url(#grad-es)" stroke-width="3"/>

    <!-- Data points -->
    <circle cx="0" cy="-155" r="8" fill="url(#grad-es)"/>
    <circle cx="120" cy="0" r="8" fill="url(#grad-es)"/>
    <circle cx="0" cy="100" r="8" fill="url(#grad-es)"/>
    <circle cx="-140" cy="0" r="8" fill="url(#grad-es)"/>

    <!-- Axis labels -->
    <text x="0" y="-195" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="white" opacity="0.9">Self</text>
    <text x="195" y="5" text-anchor="start" font-family="sans-serif" font-size="20" font-weight="700" fill="white" opacity="0.9">Trust</text>
    <text x="0" y="215" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="white" opacity="0.9">Character</text>
    <text x="-195" y="5" text-anchor="end" font-family="sans-serif" font-size="20" font-weight="700" fill="white" opacity="0.9">Relationships</text>
  </g>
</svg>
