<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="grad-un" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="grad-un2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Compass circle -->
  <g transform="translate(600, 315)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="url(#grad-un)" stroke-width="5" opacity="0.3"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="url(#grad-un)" stroke-width="3" opacity="0.2"/>

    <!-- Multiple needle directions suggesting uncertainty -->
    <!-- Main needle (solid - the direction you know) -->
    <line x1="0" y1="0" x2="0" y2="-170" stroke="url(#grad-un)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="0,-170 -10,-140 10,-140" fill="url(#grad-un)"/>

    <!-- Ghost needles (dashed - the uncertain paths) -->
    <line x1="0" y1="0" x2="120" y2="-120" stroke="url(#grad-un2)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10,8" opacity="0.5"/>
    <line x1="0" y1="0" x2="-100" y2="-140" stroke="url(#grad-un2)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10,8" opacity="0.35"/>
    <line x1="0" y1="0" x2="150" y2="-60" stroke="url(#grad-un)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10,8" opacity="0.25"/>

    <!-- Center pivot -->
    <circle cx="0" cy="0" r="12" fill="url(#grad-un)"/>
    <circle cx="0" cy="0" r="5" fill="white"/>

    <!-- Cardinal tick marks -->
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="url(#grad-un)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="195" y1="0" x2="205" y2="0" stroke="url(#grad-un)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="195" x2="0" y2="205" stroke="url(#grad-un)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="-195" y1="0" x2="-205" y2="0" stroke="url(#grad-un)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
