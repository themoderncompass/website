<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="grad-reflection" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="33%" style="stop-color:#3B82F6"/>
      <stop offset="66%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Circular reflection design - looking back and forward -->
  <g transform="translate(600, 315)">
    <!-- Left arrow pointing back (2025) -->
    <path d="M -250,0 L -150,0" stroke="url(#grad-reflection)" stroke-width="8" stroke-linecap="round"/>
    <path d="M -250,0 L -230,-20 M -250,0 L -230,20" stroke="url(#grad-reflection)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <text x="-200" y="-30" text-anchor="middle" font-size="20" font-weight="600" fill="#333">2025</text>

    <!-- Center circle representing reflection point -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#grad-reflection)" stroke-width="8"/>
    <circle cx="0" cy="0" r="40" fill="url(#grad-reflection)" opacity="0.2"/>

    <!-- Inner reflection dots -->
    <circle cx="-15" cy="-15" r="6" fill="url(#grad-reflection)"/>
    <circle cx="15" cy="-15" r="6" fill="url(#grad-reflection)"/>
    <circle cx="0" cy="10" r="6" fill="url(#grad-reflection)"/>

    <!-- Right arrow pointing forward (2026) -->
    <path d="M 150,0 L 250,0" stroke="url(#grad-reflection)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 250,0 L 230,-20 M 250,0 L 230,20" stroke="url(#grad-reflection)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <text x="200" y="-30" text-anchor="middle" font-size="20" font-weight="600" fill="#333">2026</text>

    <!-- Curved path connecting past to future through reflection -->
    <path d="M -140,-80 Q 0,-120 140,-80" fill="none" stroke="url(#grad-reflection)" stroke-width="4" stroke-dasharray="8,6" opacity="0.6"/>
  </g>
</svg>
