<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="grad-finish" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b324a7"/>
      <stop offset="100%" style="stop-color:#0087c9"/>
    </linearGradient>
    <linearGradient id="grad-finish-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b324a7"/>
      <stop offset="100%" style="stop-color:#0087c9"/>
    </linearGradient>
  </defs>

  <!-- Checkerboard finish line tape (centered, horizontal) -->
  <g transform="translate(280, 265)">
    <!-- Tape ribbon background -->
    <rect x="0" y="0" width="640" height="50" rx="4" fill="url(#grad-finish)" opacity="0.12"/>

    <!-- Checkerboard pattern on ribbon -->
    <!-- Row 1 -->
    <rect x="0"   y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="64"  y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="128" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="192" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="256" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="320" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="384" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="448" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="512" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="576" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="608" y="0"  width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <!-- Row 2 -->
    <rect x="32"  y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="96"  y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="160" y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="224" y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="288" y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="352" y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="416" y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="480" y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="544" y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>
    <rect x="608" y="25" width="32" height="25" fill="url(#grad-finish)" opacity="0.85"/>

    <!-- Ribbon outline -->
    <rect x="0" y="0" width="640" height="50" rx="4" fill="none" stroke="url(#grad-finish)" stroke-width="3"/>
  </g>

  <!-- Arrow continuing beyond the finish line (right side) -->
  <!-- Arrow shaft -->
  <line x1="920" y1="290" x2="1080" y2="290" stroke="url(#grad-finish)" stroke-width="10" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polyline points="1050,265 1085,290 1050,315" fill="none" stroke="url(#grad-finish)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Path/road leading up to the tape (left side) -->
  <line x1="120" y1="290" x2="278" y2="290" stroke="url(#grad-finish)" stroke-width="6" stroke-linecap="round" stroke-dasharray="20,12" opacity="0.5"/>

  <!-- Vertical posts holding the tape -->
  <line x1="280" y1="210" x2="280" y2="345" stroke="url(#grad-finish)" stroke-width="6" stroke-linecap="round"/>
  <line x1="920" y1="210" x2="920" y2="345" stroke="url(#grad-finish)" stroke-width="6" stroke-linecap="round"/>
</svg>
