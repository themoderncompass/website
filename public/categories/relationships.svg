<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="400" height="400" fill="#FFFFFF"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad-relationships" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="33%" style="stop-color:#EC4899"/>
      <stop offset="66%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Connected people -->
  <g transform="translate(200, 200)">
    <!-- Left person -->
    <circle cx="-50" cy="-30" r="25" fill="none" stroke="url(#grad-relationships)" stroke-width="6"/>
    <line x1="-50" y1="-5" x2="-50" y2="45" stroke="url(#grad-relationships)" stroke-width="6" stroke-linecap="round"/>
    <line x1="-50" y1="10" x2="-80" y2="35" stroke="url(#grad-relationships)" stroke-width="6" stroke-linecap="round"/>
    <line x1="-50" y1="10" x2="-20" y2="35" stroke="url(#grad-relationships)" stroke-width="6" stroke-linecap="round"/>

    <!-- Right person -->
    <circle cx="50" cy="-30" r="25" fill="none" stroke="url(#grad-relationships)" stroke-width="6"/>
    <line x1="50" y1="-5" x2="50" y2="45" stroke="url(#grad-relationships)" stroke-width="6" stroke-linecap="round"/>
    <line x1="50" y1="10" x2="20" y2="35" stroke="url(#grad-relationships)" stroke-width="6" stroke-linecap="round"/>
    <line x1="50" y1="10" x2="80" y2="35" stroke="url(#grad-relationships)" stroke-width="6" stroke-linecap="round"/>

    <!-- Connection heart -->
    <path d="M 0,-15 Q -15,-35 -30,-15 Q -30,0 0,20 Q 30,0 30,-15 Q 15,-35 0,-15 Z" fill="url(#grad-relationships)" opacity="0.4"/>
  </g>
</svg>
