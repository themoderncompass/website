<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="400" height="400" fill="#FFFFFF"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad-building" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="33%" style="stop-color:#EC4899"/>
      <stop offset="66%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Building blocks stacked -->
  <g transform="translate(200, 200)">
    <!-- Base block (largest) -->
    <rect x="-70" y="40" width="140" height="50" fill="none" stroke="url(#grad-building)" stroke-width="6" rx="5"/>

    <!-- Middle block (medium) -->
    <rect x="-55" y="-10" width="110" height="50" fill="none" stroke="url(#grad-building)" stroke-width="6" rx="5"/>

    <!-- Top block (smallest) -->
    <rect x="-40" y="-60" width="80" height="50" fill="none" stroke="url(#grad-building)" stroke-width="6" rx="5"/>

    <!-- Construction crane arm -->
    <g transform="translate(60, -80)">
      <!-- Crane vertical -->
      <line x1="0" y1="0" x2="0" y2="80" stroke="url(#grad-building)" stroke-width="5" stroke-linecap="round"/>

      <!-- Crane horizontal -->
      <line x1="0" y1="0" x2="-50" y2="0" stroke="url(#grad-building)" stroke-width="5" stroke-linecap="round"/>

      <!-- Crane cable -->
      <line x1="-30" y1="0" x2="-30" y2="30" stroke="url(#grad-building)" stroke-width="4" stroke-linecap="round" stroke-dasharray="5,5" opacity="0.7"/>

      <!-- Hook -->
      <circle cx="-30" cy="35" r="5" fill="url(#grad-building)"/>
    </g>

    <!-- Sparkle/progress indicators -->
    <circle cx="-50" cy="20" r="4" fill="url(#grad-building)" opacity="0.5"/>
    <circle cx="30" cy="-30" r="4" fill="url(#grad-building)" opacity="0.5"/>
    <circle cx="-20" cy="-40" r="4" fill="url(#grad-building)" opacity="0.5"/>
  </g>
</svg>
