<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="400" height="400" fill="#FFFFFF"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad-productivity" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="33%" style="stop-color:#EC4899"/>
      <stop offset="66%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Ascending checkmarks/steps -->
  <g transform="translate(200, 200)">
    <!-- Step 1 (shortest) -->
    <rect x="-90" y="40" width="45" height="60" fill="none" stroke="url(#grad-productivity)" stroke-width="6" rx="5"/>
    <polyline points="-82,67 -75,75 -60,55" fill="none" stroke="url(#grad-productivity)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Step 2 (medium) -->
    <rect x="-22.5" y="10" width="45" height="90" fill="none" stroke="url(#grad-productivity)" stroke-width="6" rx="5"/>
    <polyline points="-14.5,42 -7.5,50 7.5,25" fill="none" stroke="url(#grad-productivity)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Step 3 (tallest) -->
    <rect x="45" y="-30" width="45" height="130" fill="none" stroke="url(#grad-productivity)" stroke-width="6" rx="5"/>
    <polyline points="53,7 60,15 75,-15" fill="none" stroke="url(#grad-productivity)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
