<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="400" height="400" fill="#FFFFFF"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad-career" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="33%" style="stop-color:#EC4899"/>
      <stop offset="66%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Ascending ladder/steps -->
  <g transform="translate(200, 200)">
    <!-- Ladder rails -->
    <line x1="-60" y1="90" x2="-30" y2="-90" stroke="url(#grad-career)" stroke-width="7" stroke-linecap="round"/>
    <line x1="60" y1="90" x2="30" y2="-90" stroke="url(#grad-career)" stroke-width="7" stroke-linecap="round"/>

    <!-- Ladder rungs -->
    <line x1="-55" y1="70" x2="55" y2="70" stroke="url(#grad-career)" stroke-width="6" stroke-linecap="round"/>
    <line x1="-50" y1="30" x2="50" y2="30" stroke="url(#grad-career)" stroke-width="6" stroke-linecap="round"/>
    <line x1="-45" y1="-10" x2="45" y2="-10" stroke="url(#grad-career)" stroke-width="6" stroke-linecap="round"/>
    <line x1="-40" y1="-50" x2="40" y2="-50" stroke="url(#grad-career)" stroke-width="6" stroke-linecap="round"/>

    <!-- Star at top (achievement) -->
    <g transform="translate(0, -90) scale(0.8)">
      <polygon points="0,-20 5,-5 20,-5 10,5 15,20 0,10 -15,20 -10,5 -20,-5 -5,-5" fill="url(#grad-career)" opacity="0.6"/>
    </g>
  </g>
</svg>
