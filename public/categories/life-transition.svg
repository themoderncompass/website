<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="400" height="400" fill="#FFFFFF"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad-transition" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="33%" style="stop-color:#EC4899"/>
      <stop offset="66%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Path/bridge between two points -->
  <g transform="translate(200, 200)">
    <!-- Starting point -->
    <circle cx="-90" cy="40" r="20" fill="none" stroke="url(#grad-transition)" stroke-width="6"/>

    <!-- Ending point -->
    <circle cx="90" cy="-40" r="20" fill="none" stroke="url(#grad-transition)" stroke-width="6"/>

    <!-- Curved path -->
    <path d="M -70,40 Q 0,70 70,-40" fill="none" stroke="url(#grad-transition)" stroke-width="7" stroke-linecap="round" stroke-dasharray="20,10"/>

    <!-- Arrow at end -->
    <g transform="translate(70, -40) rotate(-45)">
      <polyline points="-15,5 0,-10 15,5" fill="none" stroke="url(#grad-transition)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Doorway/portal at destination -->
    <rect x="60" y="-80" width="60" height="80" fill="none" stroke="url(#grad-transition)" stroke-width="5" rx="5" opacity="0.5"/>
  </g>
</svg>
